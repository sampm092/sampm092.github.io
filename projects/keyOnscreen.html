<!DOCTYPE html>
<html>

<head>
    <style>
        :root {
            --col-size: 50px;
            --key-height: 20px;
        }

        body {
            font-family: Arial;
            text-align: center;
            height: 90vh;
            display: flex;
        }

        main {
            margin: auto;
        }

        #copyNotification {
            position: fixed;
            top: 50%;
            right: 20px;
            background-color: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            z-index: 9999;
            pointer-events: none;
        }

        #copyNotification.show {
            opacity: 1;
        }

        #display {
            width: 300px;
            height: 34px;
            font-size: 18px;
        }

        #copy {
            height: 40px;
            font-size: 18px;
            align-self: center;
        }

        #container-key1,
        #container-key2 {
            gap: 5px;
            justify-content: center;
            grid-template-columns: repeat(10, var(--col-size));
        }

        .func-key {
            margin-top: 15px;
            padding: 5px;
        }

        .func-key button {
            width: calc(var(--base-width) + var(--increase, 0px));
        }

        .size {
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 30%;
            right: 20px;
        }

        .key {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .keyboard button {
            height: var(--key-height);
        }

        .grid {
            display: grid;
        }

        .none {
            display: none;
        }

        .black {
            background-color: black;
            color: white;
        }

        .white {
            background-color: white;
            color: blue;
        }

        .flex {
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body class="black">
    <div id="copyNotification">Copied!</div>
    <div class="size">
        <p style="border: 1px solid black;" class="black">Size</p>
        <button onclick="size('up')">+</button>
        <button onclick="size('down')">-</button>
    </div>
    <main>
        <div class="flex" style="margin: auto;margin-bottom: 20px;">
            <input id="display" type="text" readonly>
            <button id="copy" onclick="copy()">Copy</button>
        </div>

        <div class="keyboard">
            <div id="container-key1" class="grid">
                <button class="keyCaps">Q</button>
                <button class="keyCaps">W</button>
                <button class="keyCaps">E</button>
                <button class="keyCaps">R</button>
                <button class="keyCaps">T</button>
                <button class="keyCaps">Y</button>
                <button class="keyCaps">U</button>
                <button class="keyCaps">I</button>
                <button class="keyCaps">O</button>
                <button class="keyCaps">P</button>

                <button class="keyCaps">A</button>
                <button class="keyCaps">S</button>
                <button class="keyCaps">D</button>
                <button class="keyCaps">F</button>
                <button class="keyCaps">G</button>
                <button class="keyCaps">H</button>
                <button class="keyCaps">J</button>
                <button class="keyCaps">K</button>
                <button class="keyCaps">L</button>

                <button class="keyCaps">Z</button>
                <button class="keyCaps">X</button>
                <button class="keyCaps">C</button>
                <button class="keyCaps">V</button>
                <button class="keyCaps">B</button>
                <button class="keyCaps">N</button>
                <button class="keyCaps">M</button>
            </div>
            <div id="container-key2" class="none grid">
                <button class="keyCaps">q</button>
                <button class="keyCaps">w</button>
                <button class="keyCaps">e</button>
                <button class="keyCaps">r</button>
                <button class="keyCaps">t</button>
                <button class="keyCaps">y</button>
                <button class="keyCaps">u</button>
                <button class="keyCaps">i</button>
                <button class="keyCaps">o</button>
                <button class="keyCaps">p</button>

                <button class="keyCaps">a</button>
                <button class="keyCaps">s</button>
                <button class="keyCaps">d</button>
                <button class="keyCaps">f</button>
                <button class="keyCaps">g</button>
                <button class="keyCaps">h</button>
                <button class="keyCaps">j</button>
                <button class="keyCaps">k</button>
                <button class="keyCaps">l</button>

                <button class="keyCaps">z</button>
                <button class="keyCaps">x</button>
                <button class="keyCaps">c</button>
                <button class="keyCaps">v</button>
                <button class="keyCaps">b</button>
                <button class="keyCaps">n</button>
                <button class="keyCaps">m</button>
            </div>

            <div class="func-key">
                <button id="theme" onclick="toggleTheme()" style="--base-width: 60px">Theme</button>
                <button id="space" style="--base-width: 55px">Space</button>
                <button id="backspace" style="--base-width: 30px">⌫</button>
                <button id="capslock" style="--base-width: 80px"> CapsLock</button>
            </div>
        </div>
    </main>

    <script>
        const display = document.getElementById("display");
        const keysCaps = document.querySelectorAll(".keyCaps");
        const key1 = document.getElementById("container-key1");
        const key2 = document.getElementById("container-key2");
        const body = document.body;
        let colsize = 50;
        let keysize = 20;
        let increase = 0;

        keysCaps.forEach(key => {
            key.addEventListener("click", () => {
                display.value += key.textContent;
            });
        });

        document.getElementById("space").addEventListener("click", () => {
            display.value += " ";
        });

        document.getElementById("backspace").addEventListener("click", () => {
            display.value = display.value.slice(0, -1);
        });

        document.getElementById("capslock").addEventListener("click", () => {
            key1.classList.toggle("none");
            key2.classList.toggle("none");
        });

        function toggleTheme() {
            body.classList.toggle("black");
            body.classList.toggle("white");
        }

        function size(value) {
            const delta = (value === 'up') ? 1 : -1;
            increase += (value === 'up') ? 10 : -10;
            increase = Math.max(increase, 0);

            colsize = Math.max(colsize + 10 * delta, 10);
            keysize = Math.max(keysize + 4 * delta, 4);

            document.documentElement.style.setProperty('--col-size', colsize + 'px');
            document.documentElement.style.setProperty('--key-height', keysize + 'px');
            document.documentElement.style.setProperty('--increase', increase + 'px');
        }

        async function copy() {
            const textOutput = document.getElementById("display").value;
            navigator.clipboard.writeText(textOutput).then(() => {
                const notification = document.getElementById("copyNotification");
                notification.classList.add("show");
                setTimeout(() => {
                    notification.classList.remove("show");
                }, 2000); // 2 seconds
            });
        }

    </script>

</body>

</html>
